title = "n8n workflow library — secret scan config"
[extend]
useDefault = true

[[rules]]
id = "apify-api-token"
description = "Apify API Token"
regex = '''apify_api_[A-Za-z0-9]{36}'''
[[rules]]
id = "generic-bearer"
description = "Bearer token in Authorization header"
regex = '''(?i)authorization"\s*:\s*"bearer\s+[A-Za-z0-9._\-]{24,}'''

[allowlist]
description = "Instructional placeholders, not real secrets"
regexes = [
  '''YOUR_[A-Z_]+''',
  '''Add your .* credential''',
  '''INSERT YOUR KEY HERE''',
  '''glpat-x+''',
  '''linkedinObject''',
  '''resourcekey=YOUR_RESOURCE_KEY''',
  '''bearer\s+YOUR_''',
]

name: Validate & Secure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Validate JSON, node graphs & inline secret patterns
        run: python3 scripts/validate.py

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks — full history
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            zricethezav/gitleaks:latest git /repo \
            --config /repo/.gitleaks.toml --redact -v --exit-code 2
      - name: Gitleaks — working tree
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            zricethezav/gitleaks:latest dir /repo \
            --config /repo/.gitleaks.toml --redact -v --exit-code 2
